name: Build Extension

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew :src:en:cyrisia:assembleDebug --stacktrace

      - name: Collect APK
        id: apk
        run: |
          APK=$(find . -path '*/outputs/apk/debug/*.apk' | head -1)
          if [ -z "$APK" ]; then echo "No debug APK produced"; exit 1; fi
          echo "Found APK: $APK"
          mkdir -p out
          cp "$APK" "out/tachiyomi-en.cyrisia-v1.4.1.apk"
          echo "path=out/tachiyomi-en.cyrisia-v1.4.1.apk" >> $GITHUB_OUTPUT

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyrisia-extension
          path: ${{ steps.apk.outputs.path }}

      - name: Delete existing release
        run: gh release delete v1.4.1 --yes --cleanup-tag 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.4.1
          name: "Cyrisia Light Novels v1.4.1"
          files: ${{ steps.apk.outputs.path }}
          body: |
            Tachiyomi/Suwayomi extension for cyrisia.com light novels.
            Add to Suwayomi as a custom repo: http://192.168.0.125:3001/ext/index.min.json
